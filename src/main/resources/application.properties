# DevMate CLI Configuration

# ===========================================
# LLM Configuration (LangChain4j)
# ===========================================

# OpenAI Configuration
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.base-url=https://api.openai.com/v1
quarkus.langchain4j.openai.chat-model.model-name=gpt-4-turbo
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.timeout=60s

# Alternative: Ollama Local Model
#quarkus.langchain4j.ollama.base-url=http://localhost:11434
#quarkus.langchain4j.ollama.chat-model.model-id=llama3

# Alternative: Anthropic Claude
#quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY}
#quarkus.langchain4j.anthropic.chat-model.model-name=claude-3-opus-20240229

# ===========================================
# Logging Configuration
# ===========================================
quarkus.log.level=INFO
quarkus.log.category."devmate".level=DEBUG
quarkus.log.category."dev.langchain4j".level=INFO
quarkus.log.console.format=%d{HH:mm:ss} [%c{1}] %s%e%n

# ===========================================
# Application Configuration
# ===========================================
quarkus.application.name=DevMate
quarkus.application.version=1.0.0

# ===========================================
# Native Compilation Configuration
# ===========================================
quarkus.native.additional-build-args=--initialize-at-run-time=org.jline
quarkus.native.enable-https-url-handler=true

# DevMate CLI Configuration

# ===========================================
# OpenAI Configuration
# ===========================================
openai.api-key=${OPENAI_API_KEY}
openai.base-url=https://api.openai.com/v1
openai.model-name=gpt-4-turbo
openai.temperature=0.7
openai.timeout=60

# ===========================================
# Logging Configuration
# ===========================================
# 日志级别
quarkus.log.level=INFO
quarkus.log.category."devmate".level=DEBUG
quarkus.log.category."dev.langchain4j".level=INFO

# 禁用控制台日志输出（CLI 交互模式）
quarkus.log.console.enable=false

# 启用文件日志
quarkus.log.file.enable=true
quarkus.log.file.path=${user.home}/.devmate/logs/devmate.log
quarkus.log.file.level=DEBUG
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%c{1}] %s%e%n
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.rotate-on-boot=true

# 抑制第三方库的警告日志
quarkus.log.category."org.jline".level=ERROR
quarkus.log.category."org.jboss".level=WARN
quarkus.log.category."io.quarkus".level=WARN

# ===========================================
# Application Configuration
# ===========================================
quarkus.application.name=DevMate
quarkus.application.version=1.0.0

# ===========================================
# Native Compilation Configuration
# ===========================================
quarkus.native.additional-build-args=--initialize-at-run-time=org.jline
quarkus.native.enable-https-url-handler=true
